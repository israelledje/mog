services:
  mongodb:
    image: mongo:latest
    container_name: cargo-tracker-db
    volumes:
      - mongodb_data:/data/db
    restart: always

  backend:
    build: ./backend
    container_name: cargo-tracker-api
    depends_on:
      - mongodb
    environment:
      - MONGO_URI=mongodb://mongodb:27017
    env_file:
      - ./backend/.env
    restart: always

  web-admin:
    build: ./web-admin
    container_name: cargo-tracker-web
    depends_on:
      - backend
    env_file:
      - ./web-admin/.env.local
    restart: always

  nginx:
    image: nginx:alpine
    container_name: cargo-tracker-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web-admin
      - backend
    restart: always

volumes:
  mongodb_data:
