services:
  mongodb:
    image: mongo:latest
    container_name: cargo-tracker-db
    volumes:
      - mongodb_data:/data/db
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  backend:
    build: ./backend
    container_name: cargo-tracker-api
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    environment:
      - MONGO_URI=mongodb://mongodb:27017
      - UPLOAD_DIR=/app/uploads
    env_file:
      - ./backend/.env
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: always

  web-admin:
    build:
      context: ./web-admin
      args:
        NEXT_PUBLIC_API_URL: /api
    container_name: cargo-tracker-web
    depends_on:
      backend:
        condition: service_healthy
    env_file:
      - ./web-admin/.env.local
    networks:
      - app-network
    restart: always

  nginx:
    image: nginx:alpine
    container_name: cargo-tracker-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - backend
      - web-admin
    networks:
      - app-network
    restart: always

  whatsapp-service:
    build: ./whatsapp-service
    container_name: cargo-tracker-whatsapp
    shm_size: '512mb'
    volumes:
      - whatsapp_session:/app/session
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: always


networks:
  app-network:
    driver: bridge

volumes:
  mongodb_data:
  whatsapp_session:
  uploads_data:
