# Résolution DNS Docker dynamique (évite 502 après rebuild du backend)
resolver 127.0.0.11 valid=10s ipv6=off;

# HTTP : redirection HTTPS + renouvellement Let's Encrypt
server {
    listen 80;
    server_name mog.dis-network.net;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name mog.dis-network.net;

    ssl_certificate /etc/letsencrypt/live/mog.dis-network.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mog.dis-network.net/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    proxy_connect_timeout 60s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    # proxy_pass SANS chemin URI quand on utilise une variable ($host)
    # sinon nginx tronque /api/auth/login → /api/ (404)
    location /api/ {
        set $backend_api backend:8000;
        proxy_pass http://$backend_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, ngrok-skip-browser-warning" always;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, ngrok-skip-browser-warning" always;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
    }

    location /uploads/ {
        set $backend_uploads backend:8000;
        proxy_pass http://$backend_uploads;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /health {
        set $backend_health backend:8000;
        proxy_pass http://$backend_health;
        proxy_set_header Host $host;
    }

    location / {
        set $web_admin web-admin:3000;
        proxy_pass http://$web_admin;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
